[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    integration: tests requieren postgres + redis + ollama corriendo
    unit: tests puros sin servicios externos
    slow: tests con tiempos > 5s
